<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ✅ Logo / Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/image.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/image.png" />

    <!-- ✅ Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ✅ Theme -->
    <meta name="theme-color" content="#FFE234" />

    <!-- ✅ SEO -->
    <meta
      name="description"
      content="Hirescope - AI-powered interview platform for evaluating candidates with real-time feedback and insights."
    />
    <meta name="keywords" content="Hirescope, AI Interview, Hiring, Interview Platform, Candidate Evaluation" />
    <meta name="author" content="Hirescope" />

    <!-- ✅ Open Graph (for sharing) -->
    <meta property="og:title" content="Hirescope - AI Interview Platform" />
    <meta
      property="og:description"
      content="Practice and evaluate interviews with AI. Get instant feedback and improve your performance."
    />
    <meta property="og:image" content="%PUBLIC_URL%/image.png" />
    <meta property="og:type" content="website" />

    <!-- ✅ Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ✅ Fonts (clean UI) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ Title -->
    <title>Hirescope</title>

    <!-- ✅ Global Styles -->
    <style>
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #f6f7fb;
        color: #111;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        min-height: 100vh;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run Hirescope.</noscript>
    <div id="root"></div>
  </body>
</html>
